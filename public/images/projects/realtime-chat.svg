<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Chat window -->
  <rect x="140" y="40" width="520" height="320" rx="16" fill="#0f172a" opacity="0.75"/>
  <!-- Header -->
  <rect x="140" y="40" width="520" height="50" rx="16" fill="#1e293b" opacity="0.9"/>
  <circle cx="180" cy="65" r="14" fill="#22d3ee" opacity="0.4"/>
  <rect x="204" y="57" width="80" height="10" rx="4" fill="#e2e8f0" opacity="0.5"/>
  <rect x="204" y="72" width="50" height="7" rx="2" fill="#22c55e" opacity="0.4"/>
  <!-- Messages -->
  <!-- Received -->
  <rect x="170" y="110" width="220" height="44" rx="12" fill="#1e293b"/>
  <rect x="186" y="122" width="140" height="8" rx="2" fill="#94a3b8" opacity="0.6"/>
  <rect x="186" y="136" width="100" height="8" rx="2" fill="#94a3b8" opacity="0.4"/>
  <!-- Sent -->
  <rect x="380" y="170" width="250" height="44" rx="12" fill="#0e7490" opacity="0.6"/>
  <rect x="396" y="182" width="180" height="8" rx="2" fill="#e2e8f0" opacity="0.5"/>
  <rect x="396" y="196" width="120" height="8" rx="2" fill="#e2e8f0" opacity="0.3"/>
  <!-- Received -->
  <rect x="170" y="230" width="200" height="36" rx="12" fill="#1e293b"/>
  <rect x="186" y="242" width="120" height="8" rx="2" fill="#94a3b8" opacity="0.6"/>
  <!-- Sent -->
  <rect x="410" y="282" width="220" height="36" rx="12" fill="#0e7490" opacity="0.6"/>
  <rect x="426" y="294" width="150" height="8" rx="2" fill="#e2e8f0" opacity="0.5"/>
  <!-- Input bar -->
  <rect x="160" y="330" width="440" height="16" rx="8" fill="#334155" opacity="0.5"/>
  <!-- Online indicators -->
  <circle cx="700" cy="100" r="6" fill="#22c55e" opacity="0.6"/>
  <circle cx="700" cy="130" r="6" fill="#22c55e" opacity="0.6"/>
  <circle cx="700" cy="160" r="6" fill="#94a3b8" opacity="0.3"/>
</svg>
