<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="100" y="50" width="600" height="300" rx="12" fill="#1e293b"/>
  <rect x="100" y="50" width="600" height="36" rx="12" fill="#334155"/>
  <circle cx="124" cy="68" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="144" cy="68" r="6" fill="#eab308" opacity="0.8"/>
  <circle cx="164" cy="68" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Terminal text -->
  <text x="120" y="115" font-family="monospace" font-size="14" fill="#22c55e" opacity="0.9">$ curl -X GET /api/tasks</text>
  <text x="120" y="145" font-family="monospace" font-size="14" fill="#94a3b8" opacity="0.7">{</text>
  <text x="140" y="170" font-family="monospace" font-size="14" fill="#60a5fa" opacity="0.7">"status"</text>
  <text x="248" y="170" font-family="monospace" font-size="14" fill="#94a3b8" opacity="0.7">:</text>
  <text x="262" y="170" font-family="monospace" font-size="14" fill="#4ade80" opacity="0.7">"200 OK"</text>
  <text x="140" y="195" font-family="monospace" font-size="14" fill="#60a5fa" opacity="0.7">"tasks"</text>
  <text x="228" y="195" font-family="monospace" font-size="14" fill="#94a3b8" opacity="0.7">: [</text>
  <text x="160" y="220" font-family="monospace" font-size="13" fill="#fbbf24" opacity="0.6">{ "id": 1, "title": "Deploy API" }</text>
  <text x="160" y="245" font-family="monospace" font-size="13" fill="#fbbf24" opacity="0.6">{ "id": 2, "title": "Add auth" }</text>
  <text x="140" y="270" font-family="monospace" font-size="14" fill="#94a3b8" opacity="0.7">]</text>
  <text x="120" y="295" font-family="monospace" font-size="14" fill="#94a3b8" opacity="0.7">}</text>
  <!-- Decorative dots -->
  <circle cx="760" cy="80" r="40" fill="#3b82f6" opacity="0.1"/>
  <circle cx="60" cy="340" r="30" fill="#6366f1" opacity="0.1"/>
</svg>
