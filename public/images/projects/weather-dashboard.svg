<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Main card -->
  <rect x="100" y="50" width="360" height="200" rx="16" fill="#1e293b" opacity="0.8"/>
  <!-- Sun icon -->
  <circle cx="170" cy="120" r="32" fill="url(#sun)" opacity="0.8"/>
  <line x1="170" y1="76" x2="170" y2="66" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="170" y1="174" x2="170" y2="164" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="214" y1="120" x2="224" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="116" y1="120" x2="126" y2="120" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Temperature -->
  <text x="240" y="120" font-family="system-ui" font-size="48" fill="#f1f5f9" opacity="0.8" font-weight="bold">72°</text>
  <rect x="240" y="138" width="120" height="10" rx="4" fill="#94a3b8" opacity="0.3"/>
  <rect x="240" y="160" width="80" height="8" rx="2" fill="#94a3b8" opacity="0.2"/>
  <!-- Stats row -->
  <rect x="120" y="200" width="80" height="32" rx="6" fill="#334155" opacity="0.5"/>
  <rect x="216" y="200" width="80" height="32" rx="6" fill="#334155" opacity="0.5"/>
  <rect x="312" y="200" width="80" height="32" rx="6" fill="#334155" opacity="0.5"/>
  <!-- Forecast cards -->
  <rect x="500" y="50" width="100" height="130" rx="12" fill="#1e293b" opacity="0.8"/>
  <rect x="616" y="50" width="100" height="130" rx="12" fill="#1e293b" opacity="0.8"/>
  <rect x="500" y="200" width="100" height="130" rx="12" fill="#1e293b" opacity="0.8"/>
  <rect x="616" y="200" width="100" height="130" rx="12" fill="#1e293b" opacity="0.8"/>
  <!-- Mini suns/clouds in forecast -->
  <circle cx="550" cy="96" r="16" fill="#fbbf24" opacity="0.5"/>
  <circle cx="666" cy="96" r="16" fill="#94a3b8" opacity="0.3"/>
  <circle cx="550" cy="246" r="16" fill="#fbbf24" opacity="0.5"/>
  <circle cx="666" cy="246" r="16" fill="#60a5fa" opacity="0.3"/>
  <!-- Chart area -->
  <rect x="100" y="270" width="600" height="100" rx="12" fill="#1e293b" opacity="0.6"/>
  <!-- Line chart -->
  <polyline points="130,340 200,310 270,320 340,300 410,290 480,305 550,295 620,310 660,320" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.6"/>
  <polyline points="130,340 200,310 270,320 340,300 410,290 480,305 550,295 620,310 660,320 660,360 130,360" fill="#38bdf8" opacity="0.08"/>
</svg>
